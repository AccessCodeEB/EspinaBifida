name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          JWT_SECRET: "ci-test-secret"
          CORS_ORIGIN: "http://localhost:3000"
        # Falla automáticamente si los umbrales de cobertura no se cumplen

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    needs: test
    # Activar definiendo ORACLE_E2E_ENABLED=true en Variables del repositorio
    # Settings → Secrets and variables → Actions → Variables → New repository variable
    if: vars.ORACLE_E2E_ENABLED == 'true'

    env:
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_CONNECTION_STRING: ${{ secrets.DB_CONNECTION_STRING }}
      ORACLE_CLIENT_PATH: /opt/oracle/instantclient_21_12
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # oracledb en modo thick requiere las librerías nativas de Oracle Instant Client
      - name: Install Oracle Instant Client
        run: |
          sudo apt-get install -y libaio1 unzip
          mkdir -p /opt/oracle
          cd /opt/oracle
          wget -q https://download.oracle.com/otn_software/linux/instantclient/2112000/instantclient-basiclite-linux.x64-21.12.0.0.0dbru.zip
          unzip -q instantclient-basiclite-linux.x64-21.12.0.0.0dbru.zip
          echo "/opt/oracle/instantclient_21_12" | sudo tee /etc/ld.so.conf.d/oracle-instantclient.conf
          sudo ldconfig

      # Restaurar el wallet de Oracle Cloud desde el secret ORACLE_WALLET_B64.
      # Crear el secret: tar -czf - -C /ruta/al/wallet . | base64 > wallet.b64
      # Luego pegar el contenido de wallet.b64 como secret ORACLE_WALLET_B64 en GitHub.
      - name: Restore Oracle wallet
        run: |
          mkdir -p wallet
          echo "${{ secrets.ORACLE_WALLET_B64 }}" | base64 --decode | tar -xz -C wallet/

      - name: Install backend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      # Arrancar el backend en segundo plano (puerto 3000)
      - name: Start backend
        run: node src/server.js &

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      # NEXT_PUBLIC_API_URL se bake en el build estático de Next.js
      - name: Build frontend
        run: npm run build --prefix frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      # Arrancar el frontend en segundo plano (puerto 3001)
      - name: Start frontend
        run: npm --prefix frontend run start -- -p 3001 &

      # Esperar a que el backend esté listo (HTTP /health) y el frontend acepte conexiones
      - name: Wait for backend and frontend
        run: npx wait-on http://localhost:3000/health tcp:localhost:3001 --timeout 120000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
